<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>URL Shortener - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0f172a;
            color: #e5e7eb;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: #020617;
            border-radius: 12px;
            border: 1px solid #1f2937;
            padding: 32px 28px;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 24px 60px rgba(15,23,42,0.8);
        }
        h1 {
            margin: 0 0 8px;
            font-size: 1.5rem;
        }
        p {
            margin: 0 0 24px;
            color: #9ca3af;
            font-size: 0.9rem;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            color: #d1d5db;
        }
        input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #374151;
            background: #020617;
            color: #e5e7eb;
            font-size: 0.95rem;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 1px #3b82f6;
        }
        button {
            margin-top: 16px;
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(to right, #3b82f6, #06b6d4);
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95rem;
        }
        button:hover {
            filter: brightness(1.05);
        }
        .hint {
            margin-top: 12px;
            font-size: 0.8rem;
            color: #9ca3af;
        }
        .error {
            margin-top: 8px;
            font-size: 0.85rem;
            color: #f97316;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Welcome back</h1>
    <p>Sign in with your account to manage and create short URLs.</p>

    <form method="post" action="/login">
        <label for="username">Email</label>
        <input id="username" name="username" type="email" autocomplete="email" placeholder="you@example.com" required>

        <label for="password" style="margin-top:12px;">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>

        <button type="submit">Log in</button>
    </form>

    <div class="hint">
        Don’t have an account yet? <a href="/ui/register.html" style="color:#3b82f6;text-decoration:none;">Sign up</a>.
    </div>

    <div class="hint">
        Use the credentials configured for your account. API keys are still supported for programmatic access.
    </div>
</div>

</body>
</html>
