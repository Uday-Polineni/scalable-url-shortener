spring.application.name=scalable-url-shortener

spring.datasource.url=jdbc:postgresql://localhost:5432/url_shortener
spring.datasource.username=postgres
spring.datasource.password=superuser123

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.flyway.enabled=true

spring.data.redis.host=localhost
spring.data.redis.port=6379

# Optional URL validation rules
# Comma-separated list of allowed domains. If empty, all domains are allowed.
# urlshortener.allowed-domains=example.com,another-example.com

# Rate limiting (requests per minute per client)
urlshortener.rate-limit.shorten-per-minute=20
urlshortener.rate-limit.register-per-minute=5
urlshortener.rate-limit.login-per-minute=10
urlshortener.rate-limit.redirect-per-minute=100
urlshortener.rate-limit.stats-per-minute=30
urlshortener.rate-limit.general-per-minute=60

# Max request body size (prevents abuse via large payloads)
spring.servlet.multipart.max-request-size=1MB
server.tomcat.max-http-form-content-size=1048576
server.tomcat.max-swallow-size=1048576

